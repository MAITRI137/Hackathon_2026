<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="100%" height="100%">
  <defs>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#2C2C24" flood-opacity="0.06" />
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFCF8" />
      <stop offset="100%" stop-color="#F3F4F1" />
    </linearGradient>
    <linearGradient id="chart-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5D7052" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#5D7052" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="900" height="420" fill="url(#bg)" rx="24" />

  <!-- Layout Grid -->
  <g transform="translate(60, 60)">
    
    <!-- Top row KPI cards -->
    <!-- KPI 1 -->
    <g transform="translate(0, 0)">
      <rect width="240" height="96" rx="16" fill="#FFFFFF" stroke="#F0EBE5" stroke-width="1.5" filter="url(#card-shadow)" />
      <text x="24" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#78786C">Fleet Health</text>
      <text x="24" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#5D7052">92%</text>
      <!-- Small organic sparkline -->
      <path d="M 140 70 C 160 65, 180 80, 210 50" fill="none" stroke="#5D7052" stroke-width="2" stroke-linecap="round" opacity="0.6" />
    </g>

    <!-- KPI 2 -->
    <g transform="translate(270, 0)">
      <rect width="240" height="96" rx="16" fill="#FFFFFF" stroke="#F0EBE5" stroke-width="1.5" filter="url(#card-shadow)" />
      <text x="24" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#78786C">Active Vehicles</text>
      <text x="24" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#2C2C24">18<tspan font-size="20" fill="#A0A096">/24</tspan></text>
      <!-- Progress Bar -->
      <rect x="140" y="60" width="76" height="8" rx="4" fill="#F0EBE5" />
      <rect x="140" y="60" width="57" height="8" rx="4" fill="#C18C5D" />
    </g>

    <!-- KPI 3 -->
    <g transform="translate(540, 0)">
      <rect width="240" height="96" rx="16" fill="#FFFFFF" stroke="#F0EBE5" stroke-width="1.5" filter="url(#card-shadow)" />
      <text x="24" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#78786C">On-Time Trips</text>
      <text x="24" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#2C2C24">94%</text>
      <circle cx="200" cy="55" r="12" fill="#E6DCCD" opacity="0.5" />
      <path d="M 195 55 L 199 59 L 206 50" fill="none" stroke="#2C2C24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Main Chart Area -->
    <g transform="translate(0, 126)">
      <rect width="510" height="214" rx="16" fill="#FFFFFF" stroke="#F0EBE5" stroke-width="1.5" filter="url(#card-shadow)" />
      
      <!-- Chart lines -->
      <g transform="translate(30, 174) scale(1, -1)">
        <path d="M0,0 L450,0" fill="none" stroke="#E6DCCD" stroke-width="1" />
        <path d="M0,45 L450,45" fill="none" stroke="#F0EBE5" stroke-width="1" stroke-dasharray="6 6" />
        <path d="M0,90 L450,90" fill="none" stroke="#F0EBE5" stroke-width="1" stroke-dasharray="6 6" />
        <path d="M0,135 L450,135" fill="none" stroke="#F0EBE5" stroke-width="1" stroke-dasharray="6 6" />
        
        <!-- Animated Chart Fill -->
        <path d="M0,0 L0,20 C 50,20 100,60 150,50 C 200,40 250,120 300,100 C 350,80 400,140 450,120 L450,0 Z" fill="url(#chart-grad)">
          <animate attributeName="opacity" from="0" to="1" dur="2s" fill="freeze" />
        </path>

        <!-- Animated Line Chart -->
        <path d="M0,20 C 50,20 100,60 150,50 C 200,40 250,120 300,100 C 350,80 400,140 450,120" fill="none" stroke="#5D7052" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="600" stroke-dashoffset="600">
          <animate attributeName="stroke-dashoffset" from="600" to="0" dur="2.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1" />
        </path>
        
        <!-- Data points -->
        <g stroke="#FFFFFF" stroke-width="3" fill="#5D7052">
          <circle cx="150" cy="50" r="0">
            <animate attributeName="r" to="5" begin="0.8s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1" />
          </circle>
          <circle cx="300" cy="100" r="0">
            <animate attributeName="r" to="5" begin="1.4s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1" />
          </circle>
          <circle cx="450" cy="120" r="0">
            <animate attributeName="r" to="5" begin="2.0s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1" />
          </circle>
        </g>
      </g>
    </g>

    <!-- Side Donut Area -->
    <g transform="translate(540, 126)">
      <rect width="240" height="214" rx="16" fill="#FFFFFF" stroke="#F0EBE5" stroke-width="1.5" filter="url(#card-shadow)" />
      
      <!-- Donut Chart -->
      <g transform="translate(120, 90)">
        <circle cx="0" cy="0" r="54" fill="none" stroke="#F3F4F1" stroke-width="14" />
        <circle cx="0" cy="0" r="54" fill="none" stroke="#C18C5D" stroke-width="14" stroke-dasharray="339.29" stroke-dashoffset="339.29" stroke-linecap="round" transform="rotate(-90)">
          <animate attributeName="stroke-dashoffset" from="339.29" to="84.82" dur="2.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1" />
        </circle>
        <text y="8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#2C2C24" text-anchor="middle">75%</text>
      </g>

      <!-- Animated Soft Bars (instead of sharp rectangles, use pill shapes) -->
      <g transform="translate(42, 175) scale(1, -1)">
        <rect x="0" y="0" width="16" height="0" rx="8" fill="#5D7052" opacity="0.8">
          <animate attributeName="height" from="0" to="28" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1" />
        </rect>
        <rect x="28" y="0" width="16" height="0" rx="8" fill="#E6DCCD">
          <animate attributeName="height" from="0" to="46" dur="1.7s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1" />
        </rect>
        <rect x="56" y="0" width="16" height="0" rx="8" fill="#5D7052" opacity="0.9">
          <animate attributeName="height" from="0" to="20" dur="1.9s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1" />
        </rect>
        <rect x="84" y="0" width="16" height="0" rx="8" fill="#E6DCCD">
          <animate attributeName="height" from="0" to="38" dur="2.1s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1" />
        </rect>
        <rect x="112" y="0" width="16" height="0" rx="8" fill="#C18C5D" opacity="0.9">
          <animate attributeName="height" from="0" to="16" dur="2.3s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1" />
        </rect>
        <rect x="140" y="0" width="16" height="0" rx="8" fill="#5D7052">
          <animate attributeName="height" from="0" to="32" dur="2.5s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1" />
        </rect>
      </g>
    </g>
    
  </g>
</svg>
