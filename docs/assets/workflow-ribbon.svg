<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#2C2C24" flood-opacity="0.06" />
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5D7052" />
      <stop offset="100%" stop-color="#C18C5D" />
    </linearGradient>
  </defs>

  <rect width="1200" height="220" fill="transparent" />

  <!-- Base Smooth Route Line -->
  <path id="routeLine" d="M100,110 C 200,110 250,70 350,70 C 450,70 500,150 600,150 C 700,150 750,70 850,70 C 950,70 1000,110 1100,110" fill="none" stroke="#E6DCCD" stroke-width="4" stroke-linecap="round" />
  
  <!-- Glowing Trail Line -->
  <path d="M100,110 C 200,110 250,70 350,70 C 450,70 500,150 600,150 C 700,150 750,70 850,70 C 950,70 1000,110 1100,110" fill="none" stroke="url(#glow-grad)" stroke-width="4" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0; 0.8; 0" dur="8s" repeatCount="indefinite" />
  </path>

  <!-- Node Pill Backgrounds -->
  <!-- Register: x=100, y=110 -->
  <g transform="translate(100, 110)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" fill="#FFFFFF" stroke="#E6DCCD" stroke-width="1.5" filter="url(#shadow)">
      <animate attributeName="stroke" values="#E6DCCD;#5D7052;#E6DCCD" begin="0s" dur="8s" repeatCount="indefinite" />
    </rect>
    <text y="5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C24" text-anchor="middle" letter-spacing="0.2">Register</text>
  </g>

  <!-- Validate: x=350, y=70 -->
  <g transform="translate(350, 70)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" fill="#FFFFFF" stroke="#E6DCCD" stroke-width="1.5" filter="url(#shadow)">
      <animate attributeName="stroke" values="#E6DCCD;#5D7052;#E6DCCD" begin="1.8s" dur="8s" repeatCount="indefinite" />
    </rect>
    <text y="5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C24" text-anchor="middle" letter-spacing="0.2">Validate</text>
  </g>

  <!-- Dispatch: x=600, y=150 -->
  <g transform="translate(600, 150)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" fill="#FFFFFF" stroke="#E6DCCD" stroke-width="1.5" filter="url(#shadow)">
      <animate attributeName="stroke" values="#E6DCCD;#5D7052;#E6DCCD" begin="3.8s" dur="8s" repeatCount="indefinite" />
    </rect>
    <text y="5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C24" text-anchor="middle" letter-spacing="0.2">Dispatch</text>
  </g>

  <!-- Track: x=850, y=70 -->
  <g transform="translate(850, 70)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" fill="#FFFFFF" stroke="#E6DCCD" stroke-width="1.5" filter="url(#shadow)">
      <animate attributeName="stroke" values="#E6DCCD;#5D7052;#E6DCCD" begin="5.8s" dur="8s" repeatCount="indefinite" />
    </rect>
    <text y="5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C24" text-anchor="middle" letter-spacing="0.2">Track</text>
  </g>

  <!-- Maintain: x=1000, y=90 -->
  <!-- Let's put Maintain & Analyze closer to the end -->
  <!-- Wait, path goes to 1100,110. Let's put Maintain at 975, 90 and Analyze at 1100, 110 -->
  <g transform="translate(975, 90)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" fill="#FFFFFF" stroke="#E6DCCD" stroke-width="1.5" filter="url(#shadow)">
      <animate attributeName="stroke" values="#E6DCCD;#5D7052;#E6DCCD" begin="6.8s" dur="8s" repeatCount="indefinite" />
    </rect>
    <text y="5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C24" text-anchor="middle" letter-spacing="0.2">Maintain</text>
  </g>

  <!-- Analyze: x=1100, y=110 -->
  <g transform="translate(1100, 110)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" fill="#FFFFFF" stroke="#E6DCCD" stroke-width="1.5" filter="url(#shadow)">
      <animate attributeName="stroke" values="#E6DCCD;#5D7052;#E6DCCD" begin="7.5s" dur="8s" repeatCount="indefinite" />
    </rect>
    <text y="5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C24" text-anchor="middle" letter-spacing="0.2">Analyze</text>
  </g>

  <!-- Traveling Dot -->
  <g filter="url(#shadow)">
    <circle cx="0" cy="0" r="8" fill="#C18C5D">
      <animateMotion dur="8s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
        <mpath href="#routeLine" />
      </animateMotion>
    </circle>
    <!-- Dot Glow -->
    <circle cx="0" cy="0" r="14" fill="#C18C5D" opacity="0.3" filter="url(#glow)">
      <animateMotion dur="8s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
        <mpath href="#routeLine" />
      </animateMotion>
      <animate attributeName="r" values="14; 20; 14" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

</svg>
