<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 120" width="1600" height="120" role="img" aria-label="footer">
  <defs>
    <linearGradient id="fHair" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="25%" stop-color="#A78BFA" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#F472B6" stop-opacity="0.85"/>
      <stop offset="75%" stop-color="#34D399" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#A3E635" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <mask id="fMask">
      <rect width="1600" height="120" fill="url(#fFade)"/>
    </mask>
    <filter id="fSoft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <style>
      @keyframes fDrift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(50px,-8px); } }
      @keyframes fDrift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-56px,6px); } }
      .fb1 { animation: fDrift1 30s ease-in-out infinite; }
      .fb2 { animation: fDrift2 36s ease-in-out infinite; }
    </style>
  </defs>

  <!-- gradient hairline -->
  <rect x="120" y="24" width="1360" height="1.5" fill="url(#fHair)"/>

  <!-- aurora glow dissolving downward -->
  <g mask="url(#fMask)">
    <g filter="url(#fSoft)">
      <ellipse class="fb1" cx="560" cy="86" rx="300" ry="55" fill="#A78BFA" opacity="0.30"/>
      <ellipse cx="800" cy="92" rx="260" ry="55" fill="#F472B6" opacity="0.24"/>
      <ellipse class="fb2" cx="1050" cy="86" rx="300" ry="55" fill="#34D399" opacity="0.26"/>
    </g>
  </g>

  <!-- end mark -->
  <rect x="795.5" y="20" width="9" height="9" transform="rotate(45 800 24.5)" fill="#F472B6" opacity="0.8"/>
</svg>
