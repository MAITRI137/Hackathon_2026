<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420" role="img" aria-labelledby="cvTitle">
  <title id="cvTitle">Vyas Devgna — Team Member: System Architecture, Backend Design &amp; Implementation, Integration</title>
  <defs>
    <linearGradient id="ringV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#A3E635"/>
    </linearGradient>
    <linearGradient id="dotV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#A3E635"/>
    </linearGradient>
    <filter id="softV" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="grainV">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <clipPath id="cardV">
      <rect x="16" y="16" width="728" height="388" rx="26"/>
    </clipPath>
    <style>
      @keyframes vDrift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-40px,26px); } }
      @keyframes vDrift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(34px,-22px); } }
      .vb1 { animation: vDrift1 30s ease-in-out infinite; }
      .vb2 { animation: vDrift2 36s ease-in-out infinite; }
    </style>
  </defs>

  <!-- card shell -->
  <rect x="16" y="16" width="728" height="388" rx="26" fill="#0C0C13"/>

  <g clip-path="url(#cardV)">
    <g filter="url(#softV)">
      <circle class="vb1" cx="620" cy="30" r="170" fill="#2EA44F" opacity="0.38"/>
      <circle class="vb2" cx="110" cy="430" r="150" fill="#A3E635" opacity="0.12"/>
    </g>
    <rect x="16" y="16" width="728" height="388" filter="url(#grainV)" opacity="0.05"/>

    <!-- ghost monogram -->
    <text x="716" y="400" text-anchor="end"
      font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="180" font-weight="800" fill="#FFFFFF" opacity="0.045">V</text>

    <!-- avatar -->
    <circle cx="112" cy="118" r="47" fill="none" stroke="url(#ringV)" stroke-width="3"/>
    <clipPath id="avatar-clip">
      <circle cx="112" cy="118" r="41" />
    </clipPath>
    <image x="71" y="77" width="82" height="82" href="data:image/png;base64," clip-path="url(#avatar-clip)" preserveAspectRatio="xMidYMid slice" />
    

    <!-- name + role chip -->
    <text x="192" y="112" font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="36" font-weight="700" letter-spacing="-0.5" fill="#FFFFFF" opacity="0.96">Vyas Devgna</text>
    <rect x="192" y="128" width="150" height="32" rx="16" fill="#2EA44F" fill-opacity="0.26" stroke="#34D399" stroke-opacity="0.35"/>
    <text x="267" y="149" text-anchor="middle"
      font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="11.5" font-weight="600" letter-spacing="2.4" fill="#86EFAC">TEAM MEMBER</text>

    <!-- divider -->
    <rect x="56" y="212" width="648" height="1" fill="#FFFFFF" opacity="0.09"/>

    <!-- responsibilities -->
    <g font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" fill="#FFFFFF" fill-opacity="0.68">
      <circle cx="66" cy="270" r="3.2" fill="url(#dotV)"/>
      <text x="86" y="276">System Architecture</text>
      <circle cx="66" cy="306" r="3.2" fill="url(#dotV)"/>
      <text x="86" y="312">Backend Design &amp; Implementation</text>
      <circle cx="66" cy="342" r="3.2" fill="url(#dotV)"/>
      <text x="86" y="348">Integration</text>
    </g>
  </g>

  <!-- hairline border on top of everything -->
  <rect x="16" y="16" width="728" height="388" rx="26" fill="none" stroke="#FFFFFF" stroke-opacity="0.11"/>
</svg>
