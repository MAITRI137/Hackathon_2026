<svg 
  xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420" role="img" aria-labelledby="cmTitle">
  <title id="cmTitle">Maitri — Team Leader: Problem Selection &amp; Product Direction, UI &amp; UX, Testing &amp; Validation, Portal Submission &amp; Final Demo</title>
  <defs>
    <linearGradient id="ringM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="dotM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="softM" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="grainM">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <clipPath id="cardM">
      <rect x="16" y="16" width="728" height="388" rx="26"/>
    </clipPath>
    <style>
      @keyframes mDrift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-40px,26px); } }
      @keyframes mDrift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(34px,-22px); } }
      .mb1 { animation: mDrift1 28s ease-in-out infinite; }
      .mb2 { animation: mDrift2 34s ease-in-out infinite; }
    </style>
  </defs>
  <!-- card shell -->
  <rect x="16" y="16" width="728" height="388" rx="26" fill="#0C0C13"/>
  <g clip-path="url(#cardM)">
    <g filter="url(#softM)">
      <circle class="mb1" cx="620" cy="30" r="170" fill="#714B67" opacity="0.55"/>
      <circle class="mb2" cx="110" cy="430" r="150" fill="#F472B6" opacity="0.16"/>
    </g>
    <rect x="16" y="16" width="728" height="388" filter="url(#grainM)" opacity="0.05"/>
    <!-- ghost monogram -->
    <text x="716" y="400" text-anchor="end"
      font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="180" font-weight="800" fill="#FFFFFF" opacity="0.045">M</text>
    <!-- avatar -->
    <circle cx="112" cy="118" r="47" fill="none" stroke="url(#ringM)" stroke-width="3"/>
    <circle cx="112" cy="118" r="41" fill="#13131C"/>
    <text x="112" y="133" text-anchor="middle"
      font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="42" font-weight="700" fill="#EDE9FE">M</text>
    <!-- name + role chip -->
    <text x="192" y="112" font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="36" font-weight="700" letter-spacing="-0.5" fill="#FFFFFF" opacity="0.96">Maitri Kansagra</text>
    <rect x="192" y="128" width="142" height="32" rx="16" fill="#714B67" fill-opacity="0.32" stroke="#A78BFA" stroke-opacity="0.35"/>
    <text x="263" y="149" text-anchor="middle"
      font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="11.5" font-weight="600" letter-spacing="2.4" fill="#C4B5FD">TEAM LEADER</text>
    <!-- divider -->
    <rect x="56" y="212" width="648" height="1" fill="#FFFFFF" opacity="0.09"/>
    <!-- responsibilities -->
    <g font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" fill="#FFFFFF" fill-opacity="0.68">
      <circle cx="66" cy="252" r="3.2" fill="url(#dotM)"/>
      <text x="86" y="258">Problem Selection &amp; Product Direction</text>
      <circle cx="66" cy="288" r="3.2" fill="url(#dotM)"/>
      <text x="86" y="294">UI &amp; UX</text>
      <circle cx="66" cy="324" r="3.2" fill="url(#dotM)"/>
      <text x="86" y="330">Testing &amp; Validation</text>
      <circle cx="66" cy="360" r="3.2" fill="url(#dotM)"/>
      <text x="86" y="366">Portal Submission &amp; Final Demo</text>
    </g>
  </g>
  <!-- hairline border on top of everything -->
  <rect x="16" y="16" width="728" height="388" rx="26" fill="none" stroke="#FFFFFF" stroke-opacity="0.11"/>
</svg>
