<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" width="1600" height="520" role="img" aria-labelledby="heroTitle">
  <title id="heroTitle">Hackathon 2026 — Team Maitri · Odoo Hackathon 2026 · Virtual Round</title>
  <defs>
    <radialGradient id="vig" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#0C0C14"/>
      <stop offset="100%" stop-color="#050507"/>
    </radialGradient>
    <linearGradient id="headline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="45%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#A3E635"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="25%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#F472B6"/>
      <stop offset="75%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#A3E635" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="85"/>
    </filter>
    <filter id="headGlow" x="-40%" y="-120%" width="180%" height="340%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <clipPath id="headClip">
      <text x="800" y="272" text-anchor="middle" font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="112" font-weight="800" letter-spacing="-3">Hackathon 2026</text>
    </clipPath>
    <clipPath id="frame">
      <rect width="1600" height="520" rx="20"/>
    </clipPath>
    <style>
      @keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(70px,34px); } }
      @keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-60px,40px); } }
      @keyframes drift3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(50px,-40px); } }
      @keyframes drift4 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-45px,-30px); } }
      .b1 { animation: drift1 26s ease-in-out infinite; }
      .b2 { animation: drift2 32s ease-in-out infinite; }
      .b3 { animation: drift3 24s ease-in-out infinite; }
      .b4 { animation: drift4 36s ease-in-out infinite; }
      @keyframes sweep { 0% { transform: translateX(-700px); } 55% { transform: translateX(2300px); } 100% { transform: translateX(2300px); } }
      .sweep { animation: sweep 7.5s cubic-bezier(0.4,0,0.2,1) infinite; }
      @keyframes blink { 0% { opacity: 1; } 49.9% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 0; } }
      .cursor { animation: blink 1.15s linear infinite; }
      @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
      .hairpulse { animation: pulse 6s ease-in-out infinite; }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1600" height="520" fill="url(#vig)"/>

    <!-- aurora field -->
    <g filter="url(#soft)">
      <circle class="b1" cx="320" cy="80" r="210" fill="#714B67" opacity="0.60"/>
      <circle class="b2" cx="1300" cy="150" r="240" fill="#F472B6" opacity="0.28"/>
      <circle class="b3" cx="540" cy="500" r="220" fill="#2EA44F" opacity="0.26"/>
      <circle class="b4" cx="1080" cy="470" r="190" fill="#A78BFA" opacity="0.30"/>
    </g>

    <!-- film grain -->
    <rect width="1600" height="520" filter="url(#grain)" opacity="0.05"/>

    <!-- eyebrow -->
    <text x="800" y="150" text-anchor="middle"
      font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="19" font-weight="500" letter-spacing="7" fill="#FFFFFF" opacity="0.55">TEAM MAITRI · ODOO HACKATHON 2026 · VIRTUAL ROUND</text>

    <!-- headline glow -->
    <text x="800" y="272" text-anchor="middle"
      font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="112" font-weight="800" letter-spacing="-3" fill="url(#headline)" opacity="0.55" filter="url(#headGlow)">Hackathon 2026</text>

    <!-- headline -->
    <text x="800" y="272" text-anchor="middle"
      font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="112" font-weight="800" letter-spacing="-3" fill="url(#headline)">Hackathon 2026</text>

    <!-- shimmer sweep clipped to headline -->
    <g clip-path="url(#headClip)">
      <g class="sweep">
        <rect x="0" y="140" width="260" height="200" fill="url(#sweepGrad)" transform="skewX(-18)"/>
      </g>
    </g>

    <!-- tagline -->
    <text x="800" y="338" text-anchor="middle"
      font-family="'SF Mono','Cascadia Code',Consolas,'JetBrains Mono',monospace"
      font-size="23" fill="#FFFFFF" opacity="0.72">Building the next great solution — one commit at a time.<tspan class="cursor" fill="#A3E635"> ▍</tspan></text>

    <!-- chip row -->
    <g font-family="'SF Pro Display','SF Pro Text',-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="500">
      <rect x="498" y="396" width="214" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.045" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="605" y="424" text-anchor="middle" fill="#E9DFE7" opacity="0.92">⚡ Pre-Round Bootstrap</text>

      <rect x="730" y="396" width="210" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.045" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="835" y="424" text-anchor="middle" fill="#DDEEE2" opacity="0.92">🌿 stable branch: main</text>

      <rect x="958" y="396" width="144" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.045" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="1030" y="424" text-anchor="middle" fill="#E6E2F4" opacity="0.92">👥 2 builders</text>
    </g>

    <!-- bottom hairline -->
    <rect class="hairpulse" x="0" y="517" width="1600" height="2" fill="url(#hairline)"/>
  </g>
</svg>
